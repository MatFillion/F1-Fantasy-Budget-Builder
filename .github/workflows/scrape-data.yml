name: Scrape F1 Fantasy Data

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC (after Sunday races)
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch F1 Fantasy data
        run: python scripts/fetch-fantasy-data.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/
          git commit -m "Update F1 Fantasy data [automated]"
          git push
